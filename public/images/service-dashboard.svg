<svg viewBox="0 0 840 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="brandV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10B981" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="840" height="540" fill="#F1F5F9"/>

  <!-- ============ SIDEBAR ============ -->
  <rect x="0" y="0" width="72" height="540" fill="#FFFFFF"/>
  <line x1="72" y1="0" x2="72" y2="540" stroke="#E2E8F0" stroke-width="1"/>
  <!-- Logo dot -->
  <rect x="24" y="26" width="24" height="24" rx="8" fill="url(#brand)"/>
  <circle cx="36" cy="38" r="4.5" fill="#FFFFFF"/>

  <!-- Active nav item (gradient pill) -->
  <rect x="16" y="92" width="40" height="40" rx="12" fill="url(#brandV)" filter="url(#soft)"/>
  <rect x="28" y="104" width="16" height="16" rx="3" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="36" y1="104" x2="36" y2="120" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="28" y1="112" x2="44" y2="112" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Nav item 2 -->
  <rect x="22" y="158" width="28" height="28" rx="8" fill="#F1F5F9"/>
  <path d="M30 178 v-9 M36 178 v-13 M42 178 v-6" stroke="#64748B" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Nav item 3 -->
  <circle cx="36" cy="222" r="6" fill="none" stroke="#94A3B8" stroke-width="2.2"/>
  <path d="M26 236 a10 8 0 0 1 20 0" fill="none" stroke="#94A3B8" stroke-width="2.2"/>
  <!-- Nav item 4 -->
  <circle cx="36" cy="282" r="9" fill="none" stroke="#94A3B8" stroke-width="2.2"/>
  <path d="M36 277 v6 l4 2" fill="none" stroke="#94A3B8" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Nav item 5 -->
  <path d="M28 332 h16 M28 340 h16 M28 348 h10" stroke="#94A3B8" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Bottom settings -->
  <circle cx="36" cy="498" r="9" fill="none" stroke="#94A3B8" stroke-width="2.2"/>
  <circle cx="36" cy="498" r="3" fill="#94A3B8"/>

  <!-- ============ TOP BAR ============ -->
  <text x="100" y="42" font-size="20" font-weight="700" fill="#0F172A">Tableau de bord</text>
  <rect x="100" y="52" width="34" height="3" rx="1.5" fill="url(#brand)"/>
  <text x="100" y="72" font-size="11.5" fill="#64748B">Vue d'ensemble · Aujourd'hui</text>

  <!-- Search pill -->
  <rect x="556" y="30" width="190" height="34" rx="17" fill="#FFFFFF" stroke="#E2E8F0"/>
  <circle cx="576" cy="47" r="5" fill="none" stroke="#94A3B8" stroke-width="1.8"/>
  <line x1="580" y1="51" x2="584" y2="55" stroke="#94A3B8" stroke-width="1.8" stroke-linecap="round"/>
  <text x="592" y="51" font-size="12" fill="#94A3B8">Rechercher</text>

  <!-- Avatar -->
  <circle cx="780" cy="47" r="18" fill="url(#brand)"/>
  <text x="780" y="51" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">FB</text>

  <!-- ============ KPI STAT CARDS (3) + SPARKLINE ============ -->
  <!-- Card 1: Revenus -->
  <g filter="url(#soft)">
    <rect x="100" y="92" width="178" height="104" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <text x="118" y="118" font-size="11.5" fill="#64748B">Revenus</text>
  <text x="118" y="150" font-size="26" font-weight="700" fill="#0F172A">48,2 k€</text>
  <rect x="118" y="162" width="58" height="20" rx="10" fill="#ECFDF5"/>
  <path d="M126 175 l3 -4 l3 4" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="134" y="176" font-size="11" font-weight="600" fill="#10B981">+12,4%</text>

  <!-- Card 2: Utilisateurs actifs -->
  <g filter="url(#soft)">
    <rect x="290" y="92" width="178" height="104" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <text x="308" y="118" font-size="11.5" fill="#64748B">Utilisateurs actifs</text>
  <text x="308" y="150" font-size="26" font-weight="700" fill="#0F172A">9 348</text>
  <rect x="308" y="162" width="54" height="20" rx="10" fill="#ECFDF5"/>
  <path d="M316 175 l3 -4 l3 4" fill="none" stroke="#10B981" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="324" y="176" font-size="11" font-weight="600" fill="#10B981">+8,1%</text>

  <!-- Card 3: Taux de conversion -->
  <g filter="url(#soft)">
    <rect x="480" y="92" width="178" height="104" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <text x="498" y="118" font-size="11.5" fill="#64748B">Taux de conversion</text>
  <text x="498" y="150" font-size="26" font-weight="700" fill="#0F172A">3,72%</text>
  <rect x="498" y="162" width="52" height="20" rx="10" fill="#FFF1F2"/>
  <path d="M506 171 l3 4 l3 -4" fill="none" stroke="#F43F5E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="514" y="176" font-size="11" font-weight="600" fill="#F43F5E">-1,5%</text>

  <!-- Sparkline card -->
  <g filter="url(#soft)">
    <rect x="670" y="92" width="146" height="104" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <text x="688" y="116" font-size="11" fill="#64748B">Cette semaine</text>
  <text x="688" y="140" font-size="17" font-weight="700" fill="#0F172A">+ 2 410</text>
  <path d="M688 182 L702 174 L716 178 L730 166 L744 170 L758 156 L772 162 L786 148 L800 152 V190 H688 Z" fill="url(#spark)"/>
  <path d="M688 182 L702 174 L716 178 L730 166 L744 170 L758 156 L772 162 L786 148 L800 152" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="800" cy="152" r="3" fill="#10B981" stroke="#FFFFFF" stroke-width="1.5"/>

  <!-- ============ MAIN CHART (area) ============ -->
  <g filter="url(#soft)">
    <rect x="100" y="212" width="430" height="208" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <text x="120" y="238" font-size="13.5" font-weight="700" fill="#0F172A">Revenus mensuels</text>
  <text x="120" y="255" font-size="11" fill="#64748B">Cette semaine</text>
  <!-- legend chips -->
  <circle cx="438" cy="234" r="4" fill="url(#brand)"/>
  <text x="447" y="238" font-size="10.5" fill="#64748B">Revenus</text>
  <circle cx="500" cy="234" r="4" fill="#CBD5E1"/>
  <text x="509" y="238" font-size="10.5" fill="#64748B">Cible</text>

  <!-- gridlines -->
  <g stroke="#F1F5F9" stroke-width="1">
    <line x1="120" y1="290" x2="510" y2="290"/>
    <line x1="120" y1="328" x2="510" y2="328"/>
    <line x1="120" y1="366" x2="510" y2="366"/>
  </g>

  <!-- target dashed line -->
  <path d="M120 312 L510 300" fill="none" stroke="#CBD5E1" stroke-width="1.6" stroke-dasharray="4 4"/>

  <!-- area + line -->
  <path d="M120 360 L175 344 L230 352 L285 318 L340 330 L395 296 L450 308 L510 274 L510 392 L120 392 Z" fill="url(#areaFill)"/>
  <path d="M120 360 L175 344 L230 352 L285 318 L340 330 L395 296 L450 308 L510 274" fill="none" stroke="url(#brand)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- highlighted point -->
  <circle cx="395" cy="296" r="4.5" fill="#FFFFFF" stroke="#8B5CF6" stroke-width="2.5"/>
  <rect x="368" y="262" width="56" height="24" rx="6" fill="#0F172A"/>
  <text x="396" y="278" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">11,8 k€</text>

  <!-- x labels -->
  <g font-size="10" fill="#94A3B8" text-anchor="middle">
    <text x="120" y="408">Lun</text>
    <text x="175" y="408">Mar</text>
    <text x="230" y="408">Mer</text>
    <text x="285" y="408">Jeu</text>
    <text x="340" y="408">Ven</text>
    <text x="395" y="408">Sam</text>
    <text x="450" y="408">Dim</text>
  </g>

  <!-- ============ DONUT / PROGRESS RING ============ -->
  <g filter="url(#soft)">
    <rect x="542" y="212" width="274" height="208" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <text x="562" y="238" font-size="13.5" font-weight="700" fill="#0F172A">Objectif mensuel</text>
  <text x="562" y="255" font-size="11" fill="#64748B">Progression vers la cible</text>

  <!-- donut -->
  <g transform="translate(628,340)">
    <circle r="48" fill="none" stroke="#F1F5F9" stroke-width="14"/>
    <!-- 73% arc, stroke-dasharray on circumference (2*pi*48≈301.6) -->
    <circle r="48" fill="none" stroke="url(#brand)" stroke-width="14" stroke-linecap="round"
            stroke-dasharray="220 301.6" transform="rotate(-90)"/>
    <text x="0" y="-2" font-size="22" font-weight="700" fill="#0F172A" text-anchor="middle">73%</text>
    <text x="0" y="16" font-size="10" fill="#64748B" text-anchor="middle">atteint</text>
  </g>

  <!-- ring legend rows -->
  <g transform="translate(700,300)">
    <rect x="0" y="0" width="10" height="10" rx="3" fill="url(#brand)"/>
    <text x="18" y="9" font-size="11" fill="#0F172A">Réalisé</text>
    <text x="96" y="9" font-size="11" font-weight="600" fill="#0F172A" text-anchor="end">35,1 k€</text>

    <rect x="0" y="26" width="10" height="10" rx="3" fill="#E2E8F0"/>
    <text x="18" y="35" font-size="11" fill="#64748B">Restant</text>
    <text x="96" y="35" font-size="11" font-weight="600" fill="#64748B" text-anchor="end">13,1 k€</text>

    <line x1="0" y1="54" x2="96" y2="54" stroke="#F1F5F9"/>
    <text x="0" y="74" font-size="11" fill="#64748B">Cible</text>
    <text x="96" y="74" font-size="11" font-weight="700" fill="#0F172A" text-anchor="end">48,2 k€</text>
  </g>

  <!-- ============ DATA TABLE (admin) ============ -->
  <g filter="url(#soft)">
    <rect x="100" y="436" width="716" height="0.0001" rx="16" fill="#FFFFFF"/>
  </g>
  <!-- The table panel -->
  <rect x="100" y="436" width="716" height="0" fill="none"/>

  <g>
    <rect x="100" y="436" width="716" height="92" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <!-- header row -->
  <text x="120" y="456" font-size="10.5" font-weight="600" fill="#94A3B8">CAMPAGNE</text>
  <text x="430" y="456" font-size="10.5" font-weight="600" fill="#94A3B8" text-anchor="end">REVENUS</text>
  <text x="660" y="456" font-size="10.5" font-weight="600" fill="#94A3B8">STATUT</text>
  <line x1="120" y1="464" x2="796" y2="464" stroke="#F1F5F9"/>

  <!-- rows (compact, 4 rows fit in panel) -->
  <!-- row 1 -->
  <circle cx="128" cy="479" r="3.5" fill="#6366F1"/>
  <text x="142" y="483" font-size="11.5" fill="#0F172A">Acquisition Été</text>
  <text x="430" y="483" font-size="11.5" font-weight="600" fill="#0F172A" text-anchor="end">12,4 k€</text>
  <rect x="660" y="473" width="62" height="18" rx="9" fill="#ECFDF5"/>
  <circle cx="671" cy="482" r="3" fill="#10B981"/>
  <text x="679" y="486" font-size="10" font-weight="600" fill="#059669">Actif</text>

  <line x1="120" y1="494" x2="796" y2="494" stroke="#F8FAFC"/>
  <!-- row 2 -->
  <circle cx="128" cy="509" r="3.5" fill="#8B5CF6"/>
  <text x="142" y="513" font-size="11.5" fill="#0F172A">Newsletter Pro</text>
  <text x="430" y="513" font-size="11.5" font-weight="600" fill="#0F172A" text-anchor="end">8,9 k€</text>
  <rect x="660" y="503" width="74" height="18" rx="9" fill="#FFFBEB"/>
  <circle cx="671" cy="512" r="3" fill="#F59E0B"/>
  <text x="679" y="516" font-size="10" font-weight="600" fill="#D97706">En pause</text>
</svg>